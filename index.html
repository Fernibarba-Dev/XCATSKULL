<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <title>Xcatskull</title>
  <meta name="description" content="Xcatskull BCN">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
    
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: linear-gradient(180deg, #bb0000, #580202);
      color: #000000; 
      font-family: "Cinzel", serif; 
      text-align: center;
      padding-bottom: 0;
    }

    .main-content {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      margin-bottom: 1rem;
      color: #000000; 
      font-family: "Cinzel", serif;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); 
    }

    p {
      font-size: 1.2rem;
      color: #000000; 
      font-family: "Cinzel", serif;
      margin-bottom: 0.5rem;
    }

    .footer {
      width: 100%;
      padding: 1rem;
      box-sizing: border-box; 
      color: #000000;
    }

   
    @media screen and (max-width: 768px) {
      body { font-size: 16px; }
      h1 { font-size: 2.5rem; } 
      .main-content { padding: 1rem; }
    }
  </style>
</head>

<body>
  <div class="main-content">
    <h1>XCATSKULL</h1>
    <p>Sitio web en construcción</p>
    <p>Próximamente...</p>
  </div>
  
  <footer class="footer">
    <p>© 2026 XCATSKULL | Todos los derechos reservados.</p>
  </footer>
</body>
</html>
